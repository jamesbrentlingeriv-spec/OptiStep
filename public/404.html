<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OptiStep Academy</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    var segmentCount = 1;
    var l = window.location;
    var pathName = l.pathname.substring(1);
    var pathParts = pathName.split('/');
    
    if (pathParts[0] && !l.search) {
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/' + pathParts[0] + '/?/' + 
        pathParts.slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
